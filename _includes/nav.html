<!-- _includes/nav.html -->
<nav class="sidenav" id="sidebar-nav">

    <!-- Architecture-Based Navigation -->
    {% for nav_item in site.navigation %}
    <div class="nav-section collapsible-section">
        <div class="nav-section-header collapsible-header collapsed" data-target="section-{{ forloop.index }}">
            <span class="nav-icon">{{ nav_item.icon }}</span>
            <span class="nav-title">{{ nav_item.title }}</span>
            <svg class="collapse-icon" width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
                <path d="M6 9L1.5 4.5L2.5 3.5L6 7L9.5 3.5L10.5 4.5L6 9Z"/>
            </svg>
        </div>
        
        <div class="nav-section-content" id="section-{{ forloop.index }}">
            {% if forloop.first %}
            <a class="sidenav-item {% if page.url == '/' %}selected{% endif %}" 
               href="{{ '/' | relative_url }}">
                <span>Home</span>
            </a>
            <a class="sidenav-item {% if page.url == '/getting-started/overview/' %}selected{% endif %}" 
               href="{{ '/getting-started/overview/' | relative_url }}">
                <span>Overview</span>
            </a>
            <a class="sidenav-item {% if page.url == '/getting-started/installation/' %}selected{% endif %}" 
               href="{{ '/getting-started/installation/' | relative_url }}">
                <span>Installation</span>
            </a>
            <a class="sidenav-item {% if page.url == '/getting-started/first-steps/' %}selected{% endif %}" 
               href="{{ '/getting-started/first-steps/' | relative_url }}">
                <span>First Steps</span>
            </a>
            {% else %}
            <a class="sidenav-item {% if page.url == nav_item.url %}selected{% endif %}" 
               href="{{ nav_item.url | relative_url }}">
                <span>Overview</span>
            </a>
            
            {% if nav_item.items %}
                {% for sub_item in nav_item.items %}
                <a class="sidenav-item {% if page.url == sub_item.url %}selected{% endif %}" 
                   href="{{ sub_item.url | relative_url }}">
                    <span>{{ sub_item.title }}</span>
                </a>
                {% endfor %}
            {% endif %}
            {% endif %}
        </div>
    </div>
    {% endfor %}

</nav>
