; Grafana custom.ini overrides for the otel-lgtm bundle.
; Loaded via GF_PATHS_CONFIG (set in docker-compose.yml).

[unified_storage]
; Grafana 13.0.1 (shipped in grafana/otel-lgtm v0.26.0..v0.27.x) has a race in
; unified-storage initialization that can deadlock on SQLite (SQLITE_BUSY) under
; slow I/O. The parquet-buffer code path avoids the race. Remove once otel-lgtm
; ships a Grafana with the underlying race fixed (likely >=13.1.x).
; Refs: https://github.com/grafana/grafana/issues/122993
migration_parquet_buffer = true
