events {
    worker_connections 1024;
}

http {
    # SSL Configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # HTTPS Server
    server {
        listen 443 ssl;
        server_name _;

        # SSL Certificates
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_trusted_certificate /etc/nginx/certs/ca.crt;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;

        # Use Docker's internal DNS resolver for runtime resolution
        # This prevents nginx from crashing if the upstream isn't available at startup
        resolver 127.0.0.11 valid=30s;
        set $grafana_upstream otel-lgtm:3000;

        # Proxy settings for Grafana
        location / {
            proxy_pass http://$grafana_upstream;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # WebSocket support (Grafana Live)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }

    # OTLP HTTP over TLS — terminates TLS and proxies to the collector's plain
    # HTTP receiver. Bearer-token auth is enforced by the collector itself
    # (bearertokenauth extension in otel-collector-config.yaml); nginx just
    # passes the Authorization header through unchanged.
    server {
        listen 4319 ssl;
        server_name _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;

        resolver 127.0.0.11 valid=30s;
        set $otlp_http_upstream otel-lgtm:4318;

        location / {
            proxy_pass http://$otlp_http_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # OTLP payloads can be large; tracing batches in particular.
            client_max_body_size 16m;
            proxy_request_buffering off;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }

    # OTLP gRPC over TLS — terminates TLS and forwards over plaintext gRPC to
    # the collector. Requires HTTP/2 (gRPC). Bearer token travels as the
    # `authorization` gRPC metadata key and is checked by the collector.
    server {
        listen 4327 ssl http2;
        server_name _;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        resolver 127.0.0.11 valid=30s;
        set $otlp_grpc_upstream otel-lgtm:4317;

        location / {
            grpc_pass grpc://$otlp_grpc_upstream;

            # Long-lived gRPC streams; allow generous timeouts.
            grpc_connect_timeout 30s;
            grpc_send_timeout 300s;
            grpc_read_timeout 300s;
        }
    }
}
